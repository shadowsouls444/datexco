<div class="container py-4">
  <h4 class="mb-4">Lista de misiones</h4>

  <div class="row g-3">

    <div *ngFor="let mision of listaMisiones" class="col-md-4">
      <div class="card shadow-sm h-100">
        <div class="card-body">

          <h5 class="card-title mb-2">Titulo: {{ mision.titulo }}</h5>

          <p class="mb-1 text-muted">Descripcion: {{ mision.descripcion }}</p>

          <p class="mb-1">Mensaje de invitacion: {{ mision.mensaje_invitacion }}</p>

        </div>
      </div>
    </div>

  </div>
</div>
